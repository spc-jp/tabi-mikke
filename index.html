<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たびみっけ Global｜写真で調べる旅の歴史と見どころ</title>
<style>
  :root {
    --main:    #F07799;
    --main2:   #f0a0bb;
    --sub:     #F6D6E6;
    --accent:  #D0A900;
    --bg1:     #fff0f5;
    --bg2:     #fde8f0;
    --bg3:     #fff8e7;
    --text-main: #F07799;
    --text-sub:  #b06080;
    --text-hint: #c0a0b0;
    --border:  rgba(240,119,153,0.2);
    --shadow:  rgba(240,119,153,0.15);
    --btn-grad: linear-gradient(135deg, #F07799 0%, #f0a0bb 50%, #D0A900 100%);
  }

  .theme-blue {
    --main:    #0179E8;
    --main2:   #4aa0f0;
    --sub:     #d0e8ff;
    --accent:  #225AD3;
    --bg1:     #f0f7ff;
    --bg2:     #e8f2ff;
    --bg3:     #f0f4ff;
    --text-main: #0179E8;
    --text-sub:  #2060b0;
    --text-hint: #80a0c0;
    --border:  rgba(1,121,232,0.2);
    --shadow:  rgba(1,121,232,0.12);
    --btn-grad: linear-gradient(135deg, #0179E8 0%, #4aa0f0 50%, #225AD3 100%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 40%, var(--bg3) 100%);
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
    transition: background 0.4s;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    position: relative;
  }

  /* ===== 設定ボタン ===== */
  .settings-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 500;
    width: 44px;
    height: 44px;
    background: white;
    border: 2px solid var(--main);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 2px 10px var(--shadow);
    transition: all 0.2s;
  }

  .settings-btn:hover { transform: rotate(30deg); }

  /* ===== 設定パネル ===== */
  .settings-panel {
    position: fixed;
    top: 68px;
    right: 16px;
    z-index: 499;
    background: white;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 4px 24px var(--shadow);
    border: 1px solid var(--border);
    width: 200px;
    display: none;
  }

  .settings-panel.open { display: block; }

  .settings-panel .panel-title {
    font-size: 12px;
    font-weight: bold;
    color: var(--text-main);
    margin-bottom: 10px;
  }

  .theme-options {
    display: flex;
    gap: 10px;
  }

  .theme-opt {
    flex: 1;
    border: 2px solid #eee;
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    font-size: 11px;
    color: #666;
    transition: all 0.2s;
  }

  .theme-opt:hover { border-color: #aaa; }
  .theme-opt.active { border-color: var(--main); color: var(--text-main); font-weight: bold; }

  .theme-opt .swatch {
    width: 32px;
    height: 18px;
    border-radius: 6px;
    margin: 0 auto 4px;
  }

  .swatch-pink { background: linear-gradient(135deg, #F07799, #D0A900); }
  .swatch-blue { background: linear-gradient(135deg, #0179E8, #225AD3); }

  /* ===== ヘッダー ===== */
  .header {
    text-align: center;
    padding: 30px 0 20px;
  }

  .header .logo {
    font-size: 28px;
    font-weight: bold;
    background: var(--btn-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    transition: background 0.4s;
  }

  .header .tagline {
    font-size: 13px;
    color: var(--text-sub);
    margin-top: 6px;
  }

  /* ===== 言語切替（常時表示） ===== */
  .lang-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 18px;
  }

  .lang-btn {
    padding: 8px 18px;
    border-radius: 20px;
    border: 2px solid var(--main);
    background: white;
    color: var(--text-main);
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }

  .lang-btn.active {
    background: var(--main);
    color: white;
    box-shadow: 0 2px 10px var(--shadow);
  }

  .lang-btn:hover:not(.active) { background: var(--bg1); }

  /* ===== カード ===== */
  .card {
    background: rgba(255,255,255,0.88);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px var(--shadow);
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
    transition: box-shadow 0.3s;
  }

  .card-title {
    font-size: 14px;
    font-weight: bold;
    color: var(--text-main);
    margin-bottom: 14px;
  }

  /* ===== アップロードエリア ===== */
  .upload-buttons {
    border: 2px dashed var(--main2);
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: linear-gradient(135deg, rgba(240,119,153,0.04), rgba(246,214,230,0.08));
  }

  .theme-blue .upload-buttons {
    background: linear-gradient(135deg, rgba(1,121,232,0.04), rgba(208,232,255,0.08));
  }

  .upload-buttons:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--shadow);
    border-color: var(--main);
    background: var(--bg1);
  }

  .upload-btn-label {
    font-size: 15px;
    font-weight: bold;
    color: var(--text-main);
  }

  #fileGallery { display: none; }

  .preview-wrap { position: relative; margin-top: 12px; }
  .preview-wrap img {
    width: 100%;
    border-radius: 12px;
    max-height: 280px;
    object-fit: cover;
    box-shadow: 0 4px 16px var(--shadow);
  }

  .preview-wrap .remove-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(240,119,153,0.85);
    color: white;
    border: none;
    border-radius: 50%;
    width: 30px; height: 30px;
    cursor: pointer;
    font-size: 14px;
  }

  /* ===== テキスト＋音声 ===== */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  textarea {
    flex: 1;
    border: 1.5px solid var(--sub);
    border-radius: 12px;
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    color: #444;
    background: rgba(255,255,255,0.8);
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--main); background: white; }

  .mic-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: white;
    box-shadow: 0 2px 10px var(--shadow);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 0px;
    padding: 0;
    position: relative;
    overflow: visible;
  }

  .mic-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 16px var(--shadow);
  }

  .mic-btn .mic-svg { width: 26px; height: 26px; transition: all 0.2s; }
  .mic-btn .mic-svg path,
  .mic-btn .mic-svg rect,
  .mic-btn .mic-svg circle { transition: fill 0.2s, stroke 0.2s; }

  .mic-btn.recording {
    background: var(--main);
    animation: micPulse 1s ease-in-out infinite;
  }

  .mic-btn.recording .mic-svg path,
  .mic-btn.recording .mic-svg rect { stroke: white !important; }
  .mic-btn.recording .mic-svg .mic-body { fill: white !important; }

  /* 録音中の波紋 */
  .mic-btn.recording::before,
  .mic-btn.recording::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--main);
    animation: ripple 1.2s ease-out infinite;
    opacity: 0;
  }
  .mic-btn.recording::after { animation-delay: 0.4s; }

  @keyframes ripple {
    0%   { width: 50px; height: 50px; opacity: 0.6; }
    100% { width: 80px; height: 80px; opacity: 0; }
  }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 4px 16px var(--shadow); }
    50%       { box-shadow: 0 4px 24px var(--shadow); }
  }

  .char-hint { font-size: 11px; color: var(--text-hint); text-align: right; margin-top: 4px; }

  /* ===== メインボタン ===== */
  .btn-main {
    display: block;
    width: 100%;
    padding: 18px;
    background: var(--btn-grad);
    background-size: 200% 200%;
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px var(--shadow);
  }

  .btn-main:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px var(--shadow);
  }

  .btn-main:disabled {
    background: linear-gradient(135deg, #ddd, #ccc);
    transform: none; box-shadow: none; cursor: not-allowed;
  }

  /* ===== フラッシュ ===== */
  .flash-overlay {
    position: fixed; inset: 0;
    background: white; opacity: 0;
    pointer-events: none; z-index: 9999;
    transition: opacity 0.05s;
  }
  .flash-overlay.active { opacity: 0.85; }

  /* ===== 桜ローディング ===== */
  .loading {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }

  .sakura-container {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 100; overflow: hidden;
  }

  .petal {
    position: absolute; top: -30px;
    animation: fall linear infinite; opacity: 0.85;
  }

  @keyframes fall {
    0%   { transform: translateY(-30px) rotate(0deg) translateX(0); opacity: 0.9; }
    50%  { transform: translateY(50vh) rotate(180deg) translateX(30px); }
    100% { transform: translateY(110vh) rotate(360deg) translateX(-20px); opacity: 0; }
  }

  .shutter-ring {
    width: 60px; height: 60px;
    border: 4px solid var(--sub);
    border-top-color: var(--main);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { color: var(--text-main); font-size: 15px; font-weight: bold; }
  .loading-sub  { color: var(--text-hint); font-size: 12px; margin-top: 6px; }

  /* ===== 結果カード ===== */
  .result-card {
    display: none;
    background: rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px var(--shadow);
    border: 1.5px solid var(--border);
    position: relative; overflow: hidden;
  }

  .result-header {
    font-size: 14px;
    color: var(--text-main);
    font-weight: bold;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--sub);
  }

  /* コピーボタン */
  .copy-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--main);
    background: white;
    color: var(--text-main);
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .copy-btn:hover  { background: var(--bg1); }
  .copy-btn.copied { background: var(--main); color: white; }

  .result-section {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--sub);
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }

  .result-section:nth-child(1) { animation-delay: 0.1s; }
  .result-section:nth-child(2) { animation-delay: 0.3s; }
  .result-section:nth-child(3) { animation-delay: 0.5s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

  .section-label {
    font-size: 13px;
    font-weight: bold;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .section-body { font-size: 14px; color: #444; line-height: 1.9; }

  /* キラキラ */
  .sparkle {
    position: fixed; pointer-events: none; z-index: 200;
    animation: sparkleAnim 1.2s ease-out forwards;
  }

  @keyframes sparkleAnim {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.3); }
  }

  /* ===== リセットボタン ===== */
  .btn-reset {
    display: block; width: 100%;
    padding: 14px;
    background: white;
    color: var(--text-main);
    border: 2px solid var(--main);
    border-radius: 14px;
    font-size: 14px; font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }

  .btn-reset:hover { background: var(--bg1); }

  /* ===== エラー ===== */
  .error-msg {
    background: #fff0f5;
    border: 1px solid var(--sub);
    color: #c06080;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 12px;
    display: none;
  }

  /* ===== フッター ===== */
  .footer {
    text-align: center;
    padding: 20px 0 30px;
    font-size: 12px;
    color: var(--text-hint);
  }

  .footer a { color: var(--text-main); text-decoration: none; }
</style>
</head>
<body id="body">

<!-- フラッシュ -->
<div class="flash-overlay" id="flashOverlay"></div>
<!-- 桜コンテナ -->
<div class="sakura-container" id="sakuraContainer"></div>
<!-- 設定ボタン -->
<button class="settings-btn" onclick="toggleSettings()" title="配色設定">⚙️</button>
<!-- 設定パネル -->
<div class="settings-panel" id="settingsPanel">
  <div class="panel-title">🎨 配色を選ぶ</div>
  <div class="theme-options">
    <div class="theme-opt active" id="opt-pink" onclick="setTheme('pink')">
      <div class="swatch swatch-pink"></div>
      🌸 ピンク
    </div>
    <div class="theme-opt" id="opt-blue" onclick="setTheme('blue')">
      <div class="swatch swatch-blue"></div>
      💙 ブルー
    </div>
  </div>
</div>

<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <div class="logo" id="logoText">✈️ たびみっけ Global</div>
    <div class="tagline" id="tagline">写真を撮るだけで、その場所の歴史と見どころがわかる</div>
  </div>

  <!-- 言語切替（常時表示） -->
  <div class="lang-bar">
    <button class="lang-btn active" id="lang-ja" onclick="setLang('ja')">🇯🇵 日本語</button>
    <button class="lang-btn" id="lang-en" onclick="setLang('en')">🇺🇸 English</button>
    <button class="lang-btn" id="lang-zh" onclick="setLang('zh')">🇨🇳 中文</button>
  </div>

  <!-- 写真アップロード -->
  <div class="card">
    <div class="card-title" id="label-step1">📸 ステップ1｜写真を選ぶ</div>

    <div class="upload-buttons" id="uploadArea" onclick="document.getElementById('fileGallery').click()">
      <svg viewBox="0 0 56 46" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:64px;height:64px;margin:0 auto 10px;display:block;">
        <rect x="2" y="10" width="52" height="34" rx="6" fill="var(--bg1)" stroke="var(--main)" stroke-width="2"/>
        <path d="M17 10 L21 3 H35 L39 10" stroke="var(--main)" stroke-width="2" stroke-linejoin="round" fill="var(--bg1)"/>
        <circle cx="28" cy="28" r="9" fill="var(--main)" opacity="0.1" stroke="var(--main)" stroke-width="2"/>
        <circle cx="28" cy="28" r="5" fill="white" stroke="var(--main)" stroke-width="2"/>
        <circle cx="28" cy="28" r="2.5" fill="var(--main)" opacity="0.5"/>
        <circle cx="30" cy="26" r="1" fill="white" opacity="0.9"/>
        <circle cx="46" cy="16" r="2.5" fill="var(--accent)" opacity="0.8"/>
      </svg>
      <div class="upload-btn-label" id="label-upload">ここをタップして写真を選ぶ</div>
      <div style="font-size:12px;color:var(--text-hint);margin-top:5px;" id="label-upload-sub">神社・城・街並み・石碑など何でもOK 🏯</div>
    </div>

    <input type="file" id="fileGallery" accept="image/*">
    <div class="preview-wrap" id="previewWrap" style="display:none">
      <img id="previewImg" src="" alt="preview">
      <button class="remove-btn" onclick="removeImage()">✕</button>
    </div>
  </div>

  <!-- テキスト＋音声 -->
  <div class="card">
    <div class="card-title" id="label-step2">✏️ ステップ2｜補足情報（任意）</div>
    <div class="input-row">
      <textarea id="userText" rows="3" placeholder="例：京都の神社です／江戸時代と書いてあった／〇〇市にあります"></textarea>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="音声入力">
        <svg class="mic-svg" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect class="mic-body" x="9" y="2" width="8" height="13" rx="4"
            fill="var(--main)" opacity="0.15" stroke="var(--main)" stroke-width="1.8"/>
          <rect x="11.5" y="4" width="3" height="4" rx="1.5" fill="var(--main)" opacity="0.3"/>
          <path d="M5 13 C5 19 21 19 21 13" stroke="var(--main)" stroke-width="1.8"
            stroke-linecap="round" fill="none"/>
          <line x1="13" y1="19" x2="13" y2="23" stroke="var(--main)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="9" y1="23" x2="17" y2="23" stroke="var(--main)" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="char-hint" id="label-hint">写真だけでもOK。補足があるとより正確になります🌸</div>
  </div>

  <!-- エラー -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- 送信ボタン -->
  <button class="btn-main" id="submitBtn" onclick="analyze()">
    <span id="label-btn">🔍 この場所を調べる</span>
  </button>

  <!-- ローディング -->
  <div class="loading" id="loading">
    <div class="shutter-ring"></div>
    <div class="loading-text" id="label-loading">📚 歴史を調べています...</div>
    <div class="loading-sub" id="label-loading-sub">花びらが舞う間、少々お待ちください🌸</div>
  </div>

  <!-- 結果 -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span id="label-result">🌸 調査結果</span>
      <button class="copy-btn" id="copyBtn" onclick="copyResult()">
        📋 <span id="label-copy">コピー</span>
      </button>
    </div>
    <div id="resultContent"></div>
  </div>

  <!-- リセット -->
  <button class="btn-reset" id="resetBtn" style="display:none" onclick="resetAll()">
    <span id="label-reset">🔄 別の場所を調べる</span>
  </button>

  <!-- フッター -->
  <div class="footer">
    たびみっけ Global｜Powered by <a href="https://smileplusctg.com" target="_blank">Smile Plus Consulting</a><br>
    ※ AI回答のため、内容は参考情報としてご活用ください
  </div>

</div>

<script>
// ========== 設定 ==========
const WORKER_URL = 'https://tabi-mikke.yymmatsu.workers.dev';

let selectedFile = null;
let base64Data   = null;
let sakuraInterval = null;
let recognition  = null;
let isRecording  = false;
let currentLang  = 'ja';
let currentTheme = 'pink';
let resultText   = '';

// ========== 多言語テキスト ==========
const i18n = {
  ja: {
    tagline:       '写真を撮るだけで、その場所の歴史と見どころがわかる',
    step1:         '📸 ステップ1｜写真を選ぶ',
    camera:        '📷 カメラで撮影',
    gallery:       '🖼️ 保存した写真から選ぶ',
    orLabel:       'または',
    upload:        'ここをタップして写真を選ぶ',
    uploadSub:     '神社・城・街並み・石碑など何でもOK 🏯',
    step2:         '✏️ ステップ2｜補足情報（任意）',
    placeholder:   '例：京都の神社です／江戸時代と書いてあった／〇〇市にあります',
    hint:          '写真だけでもOK。補足があるとより正確になります🌸',
    btn:           '🔍 この場所を調べる',
    loading:       '📚 歴史を調べています...',
    loadingSub:    '花びらが舞う間、少々お待ちください🌸',
    result:        '🌸 調査結果',
    copy:          'コピー',
    copied:        'コピーしました！',

  currentLang = lang;
  const t = i18n[lang];
  document.getElementById('tagline').textContent          = t.tagline;
  document.getElementById('label-step1').textContent      = t.step1;
  document.getElementById('label-upload').textContent     = t.upload;
  document.getElementById('label-upload-sub').textContent = t.uploadSub;
  document.getElementById('label-upload').textContent    = t.upload;
  document.getElementById('label-upload-sub').textContent = t.uploadSub;
  document.getElementById('label-step2').textContent     = t.step2;
  document.getElementById('userText').placeholder        = t.placeholder;
  document.getElementById('label-hint').textContent      = t.hint;
  document.getElementById('label-btn').textContent       = t.btn;
  document.getElementById('label-loading').textContent   = t.loading;
  document.getElementById('label-loading-sub').textContent = t.loadingSub;
  document.getElementById('label-result').textContent    = t.result;
  document.getElementById('label-copy').textContent      = t.copy;
  document.getElementById('label-reset').textContent     = t.reset;

  ['ja','en','zh'].forEach(l => {
    document.getElementById('lang-'+l).classList.toggle('active', l === lang);
  });
}

// ========== テーマ切替 ==========

  currentTheme = theme;
  document.getElementById('body').className = theme === 'blue' ? 'theme-blue' : '';
  document.getElementById('opt-pink').classList.toggle('active', theme === 'pink');
  document.getElementById('opt-blue').classList.toggle('active', theme === 'blue');
}

// ========== 設定パネル ==========
function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

document.addEventListener('click', function(e) {
  const panel = document.getElementById('settingsPanel');
  const btn   = document.querySelector('.settings-btn');
  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove('open');
  }
});

// ========== 画像選択（共通処理） ==========
function handleFileSelect(file) {
  if (!file) return;
  if (file.size > 20 * 1024 * 1024) {
    showError('ファイルサイズが大きすぎます。別の写真をお試しください。');
    return;
  }
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const MAX = 1280;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      base64Data = dataUrl.split(',')[1];
      document.getElementById('previewImg').src = dataUrl;
      document.getElementById('previewWrap').style.display = 'block';
      document.getElementById('uploadArea').style.display  = 'none';
      hideError();
    };
    img.onerror = function() {
      showError('画像の読み込みに失敗しました。別の写真をお試しください。');
      selectedFile = null;
    };
    img.src = ev.target.result;
  };
  reader.onerror = function() {
    showError('ファイルの読み込みに失敗しました。別の写真をお試しください。');
    selectedFile = null;
  };
  reader.readAsDataURL(file);
}

document.getElementById('fileGallery').addEventListener('change', function(e) { handleFileSelect(e.target.files[0]); });

function removeImage() {
  selectedFile = base64Data = null;
  document.getElementById('fileGallery').value = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('uploadArea').style.display  = 'block';
}

// ========== 音声入力 ==========
function toggleMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert(i18n[currentLang].errMic);
    return;
  }

  if (isRecording) {
    recognition.stop();
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = i18n[currentLang].speechLang;
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = function() {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').title = i18n[currentLang].micStart;
  };

  recognition.onresult = function(e) {
    const transcript = e.results[0][0].transcript;
    const ta = document.getElementById('userText');
    ta.value = ta.value ? ta.value + ' ' + transcript : transcript;
  };

  recognition.onend = function() {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').title = '音声入力';
  };

  recognition.onerror = function() {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
  };

  recognition.start();
}

// ========== アニメーション ==========
function triggerFlash() {
  const overlay = document.getElementById('flashOverlay');
  overlay.classList.add('active');
  setTimeout(() => overlay.classList.remove('active'), 120);
}

function startSakura() {
  const container = document.getElementById('sakuraContainer');
  container.innerHTML = '';
  const petals = i18n[currentLang].petals;
  sakuraInterval = setInterval(() => {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petals[Math.floor(Math.random() * petals.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (14 + Math.random() * 12) + 'px';
    p.style.animationDuration = (3 + Math.random() * 3) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 6000);
  }, 300);
}

function stopSakura() {
  if (sakuraInterval) { clearInterval(sakuraInterval); sakuraInterval = null; }
  setTimeout(() => { document.getElementById('sakuraContainer').innerHTML = ''; }, 3000);
}

function triggerSparkles() {
  const sp = ['✨','⭐','🌟','💫','✨','🌸'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = sp[Math.floor(Math.random() * sp.length)];
      s.style.left = (20 + Math.random() * 60) + 'vw';
      s.style.top  = (30 + Math.random() * 40) + 'vh';
      s.style.fontSize = (16 + Math.random() * 14) + 'px';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1200);
    }, i * 80);
  }
}

// ========== 解析実行 ==========
async function analyze() {
  const t = i18n[currentLang];
  const userText = document.getElementById('userText').value.trim();

  if (!base64Data) { showError(t.errNoImage); return; }

  // base64サイズチェック（4MB超は警告）
  const byteSize = Math.round(base64Data.length * 0.75);
  if (byteSize > 4 * 1024 * 1024) {
    showError('画像サイズが大きすぎます。もう少し小さい写真をお試しください。');
    return;
  }

  hideError();
  triggerFlash();

  setTimeout(async () => {
    showLoading(true);
    startSakura();
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('resetBtn').style.display   = 'none';

    // 言語別プロンプト
    const prompts = {
      ja: `この写真に写っている場所を調べてください。${userText ? '補足：' + userText : ''}
以下の形式で日本語のみで回答。マークダウン・記号装飾は禁止。◆記号のみ使用。

◆ 場所名（推定）
◆ 歴史・背景
◆ おすすめポイント
・（見どころ1）
・（見どころ2）
・（見どころ3）

不確かな場合は「〜と思われます」と添えてください。`,

      en: `Please research the location shown in this photo.${userText ? ' Additional info: ' + userText : ''}
Reply in English only using this format. No markdown. Use ◆ only.

◆ Place Name (estimated)
◆ History & Background
◆ Highlights
・(point 1)
・(point 2)
・(point 3)

If uncertain, add "it is believed that..." or similar.`,

      zh: `请查询照片中显示的地点。${userText ? '补充信息：' + userText : ''}
请仅用中文回答，使用以下格式。禁止使用Markdown。仅使用◆符号。

◆ 地点名称（推测）
◆ 历史背景
◆ 推荐看点
・（看点1）
・（看点2）
・（看点3）

如不确定，请加上"据推测…"等表达。`
    };

    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          imageBase64: base64Data,
          mediaType: 'image/jpeg',
          text: prompts[currentLang],
          language: currentLang
        })
      });

      if (!response.ok) throw new Error();
      const data = await response.json();
      resultText = data.result;
      showResult(resultText);
      triggerSparkles();

    } catch {
      showError(t.errServer);
    } finally {
      showLoading(false);
      stopSakura();
      document.getElementById('submitBtn').disabled = false;
    }
  }, 150);
}

// ========== 結果表示 ==========
function showResult(text) {
  const container = document.getElementById('resultContent');
  const sections  = i18n[currentLang].sections;
  const parts     = text.split('◆').filter(s => s.trim());
  let html        = '';

  if (parts.length >= 2) {
    parts.forEach((part, i) => {
      const lines = part.trim().split('\n');
      lines.shift();
      const content = lines.join('\n').trim();
      const s = sections[i] || { key: '', icon: '🌸' };
      if (content) {
        html += `<div class="result-section">
          <div class="section-label">${s.icon} ${s.key}</div>
          <div class="section-body">${content.replace(/\n/g, '<br>')}</div>
        </div>`;
      }
    });
  } else {
    html = `<div class="section-body">${text.replace(/\n/g, '<br>')}</div>`;
  }

  container.innerHTML = html;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resetBtn').style.display   = 'block';
  document.getElementById('copyBtn').classList.remove('copied');
  document.getElementById('label-copy').textContent   = i18n[currentLang].copy;
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ========== コピー ==========
function copyResult() {
  if (!resultText) return;
  navigator.clipboard.writeText(resultText).then(() => {
    const btn   = document.getElementById('copyBtn');
    const label = document.getElementById('label-copy');
    btn.classList.add('copied');
    label.textContent = i18n[currentLang].copied;
    setTimeout(() => {
      btn.classList.remove('copied');
      label.textContent = i18n[currentLang].copy;
    }, 2000);
  });
}

// ========== リセット ==========
function resetAll() {
  removeImage();
  document.getElementById('userText').value = '';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('resetBtn').style.display   = 'none';
  resultText = '';
  hideError();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showLoading(flag) {
  document.getElementById('loading').style.display = flag ? 'block' : 'none';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}
