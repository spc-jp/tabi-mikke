<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たびみっけ Global｜写真で調べる旅の歴史と見どころ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: linear-gradient(135deg, #e8f4fd 0%, #f0f8ff 100%);
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  /* ヘッダー */
  .header {
    text-align: center;
    padding: 30px 0 20px;
  }

  .header .logo {
    font-size: 28px;
    font-weight: bold;
    color: #0179E8;
    letter-spacing: 2px;
  }

  .header .logo span {
    color: #225AD3;
  }

  .header .tagline {
    font-size: 13px;
    color: #666;
    margin-top: 6px;
  }

  .header .badge {
    display: inline-block;
    background: #0179E8;
    color: white;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
  }

  /* カード */
  .card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(1,121,232,0.08);
  }

  .card-title {
    font-size: 14px;
    font-weight: bold;
    color: #225AD3;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 写真アップロード */
  .upload-area {
    border: 2px dashed #0179E8;
    border-radius: 12px;
    padding: 30px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #f8fbff;
  }

  .upload-area:hover {
    background: #eef6ff;
    border-color: #225AD3;
  }

  .upload-area .icon {
    font-size: 40px;
    margin-bottom: 8px;
  }

  .upload-area .text {
    font-size: 14px;
    color: #0179E8;
    font-weight: bold;
  }

  .upload-area .sub {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
  }

  #fileInput {
    display: none;
  }

  .preview-wrap {
    position: relative;
    margin-top: 12px;
  }

  .preview-wrap img {
    width: 100%;
    border-radius: 10px;
    max-height: 280px;
    object-fit: cover;
  }

  .preview-wrap .remove-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 14px;
  }

  /* テキスト入力 */
  textarea {
    width: 100%;
    border: 1px solid #dde8f5;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    color: #333;
    background: #f8fbff;
    line-height: 1.6;
  }

  textarea:focus {
    border-color: #0179E8;
    background: white;
  }

  .char-hint {
    font-size: 11px;
    color: #aaa;
    text-align: right;
    margin-top: 4px;
  }

  /* ボタン */
  .btn-main {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #0179E8, #225AD3);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn-main:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(1,121,232,0.4);
  }

  .btn-main:disabled {
    background: #ccc;
    transform: none;
    box-shadow: none;
    cursor: not-allowed;
  }

  /* ローディング */
  .loading {
    text-align: center;
    padding: 30px;
    display: none;
  }

  .loading .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e0ecff;
    border-top-color: #0179E8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading .loading-text {
    color: #0179E8;
    font-size: 14px;
  }

  /* 結果表示 */
  .result-card {
    display: none;
    background: white;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(1,121,232,0.08);
    border-left: 4px solid #0179E8;
  }

  .result-card .result-header {
    font-size: 13px;
    color: #0179E8;
    font-weight: bold;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .result-content {
    font-size: 14px;
    color: #333;
    line-height: 1.9;
    white-space: pre-wrap;
  }

  .result-section {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid #f0f0f0;
  }

  .result-section:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .result-section .section-label {
    font-size: 13px;
    font-weight: bold;
    color: #225AD3;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .result-section .section-body {
    font-size: 14px;
    color: #444;
    line-height: 1.8;
  }

  /* リセットボタン */
  .btn-reset {
    display: block;
    width: 100%;
    padding: 12px;
    background: white;
    color: #0179E8;
    border: 2px solid #0179E8;
    border-radius: 12px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }

  .btn-reset:hover {
    background: #eef6ff;
  }

  /* フッター */
  .footer {
    text-align: center;
    padding: 20px 0 30px;
    font-size: 12px;
    color: #aaa;
  }

  .footer a {
    color: #0179E8;
    text-decoration: none;
  }

  /* エラー */
  .error-msg {
    background: #fff0f0;
    border: 1px solid #ffcccc;
    color: #cc0000;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 12px;
    display: none;
  }

  /* 言語バッジ（将来対応） */
  .lang-note {
    font-size: 11px;
    color: #999;
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <div class="logo">✈️ たびみっけ <span>Global</span></div>
    <div class="tagline">写真を撮るだけで、その場所の歴史と見どころがわかる</div>
    <div class="badge">🇯🇵 日本語版</div>
  </div>

  <!-- 写真アップロード -->
  <div class="card">
    <div class="card-title">📸 ステップ1｜写真をアップロード</div>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="icon">🏯</div>
      <div class="text">ここをタップして写真を選ぶ</div>
      <div class="sub">神社・城・街並み・石碑など何でもOK</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
    <div class="preview-wrap" id="previewWrap" style="display:none">
      <img id="previewImg" src="" alt="プレビュー">
      <button class="remove-btn" onclick="removeImage()">✕</button>
    </div>
  </div>

  <!-- テキスト補足 -->
  <div class="card">
    <div class="card-title">✏️ ステップ2｜補足情報（任意）</div>
    <textarea id="userText" rows="3" placeholder="例：京都の神社です／説明板に「江戸時代」と書いてあった／〇〇市にあります"></textarea>
    <div class="char-hint">写真だけでもOK。補足があるとより正確になります</div>
  </div>

  <!-- エラー -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- 送信ボタン -->
  <button class="btn-main" id="submitBtn" onclick="analyze()">
    🔍 この場所を調べる
  </button>
  <div class="lang-note">※ 多言語対応版（English / 中文）は近日公開予定</div>

  <!-- ローディング -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">📚 歴史を調べています...<br>少々お待ちください</div>
  </div>

  <!-- 結果 -->
  <div class="result-card" id="resultCard">
    <div class="result-header">✅ 調査結果</div>
    <div id="resultContent"></div>
  </div>

  <!-- リセット -->
  <button class="btn-reset" id="resetBtn" style="display:none" onclick="resetAll()">
    🔄 別の場所を調べる
  </button>

  <!-- フッター -->
  <div class="footer">
    たびみっけ Global｜Powered by <a href="https://smileplusctg.com" target="_blank">Smile Plus Consulting</a><br>
    ※ AI回答のため、内容は参考情報としてご活用ください
  </div>

</div>

<script>
// ========================================
// Worker URL（Cloudflare Workerに差し替え）
// ========================================
const WORKER_URL = 'https://tabi-mikke.yymmatsu.workers.dev';

let selectedFile = null;
let base64Data = null;

// 画像選択
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  selectedFile = file;

  const reader = new FileReader();
  reader.onload = function(ev) {
    base64Data = ev.target.result.split(',')[1];
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('uploadArea').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

// 画像削除
function removeImage() {
  selectedFile = null;
  base64Data = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('uploadArea').style.display = 'block';
}

// 解析実行
async function analyze() {
  const userText = document.getElementById('userText').value.trim();

  if (!base64Data) {
    showError('写真をアップロードしてください 📸');
    return;
  }

  hideError();
  showLoading(true);
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        imageBase64: base64Data,
        mediaType: selectedFile.type,
        text: userText,
        language: 'ja'
      })
    });

    if (!response.ok) throw new Error('サーバーエラーが発生しました');

    const data = await response.json();
    showResult(data.result);

  } catch (err) {
    showError('エラーが発生しました。時間をおいて再度お試しください。');
    console.error(err);
  } finally {
    showLoading(false);
    document.getElementById('submitBtn').disabled = false;
  }
}

// 結果表示
function showResult(text) {
  const container = document.getElementById('resultContent');

  // セクション分割して表示
  const sections = [
    { key: '場所名', icon: '📍' },
    { key: '歴史・背景', icon: '📖' },
    { key: 'おすすめポイント', icon: '⭐' }
  ];

  let html = '';
  let remaining = text;

  sections.forEach((s, i) => {
    const nextKey = i < sections.length - 1 ? sections[i + 1].key : null;
    let content = '';

    const startIdx = remaining.indexOf('◆');
    if (startIdx !== -1) {
      const nextIdx = nextKey ? remaining.indexOf('◆', startIdx + 1) : -1;
      if (nextIdx !== -1) {
        content = remaining.substring(startIdx, nextIdx).trim();
        remaining = remaining.substring(nextIdx);
      } else {
        content = remaining.substring(startIdx).trim();
        remaining = '';
      }
      // ◆ラベル行を除く
      const lines = content.split('\n');
      lines.shift();
      content = lines.join('\n').trim();
    }

    if (content) {
      html += `<div class="result-section">
        <div class="section-label">${s.icon} ${s.key}</div>
        <div class="section-body">${content.replace(/\n/g, '<br>')}</div>
      </div>`;
    }
  });

  // セクション分割できなかった場合はそのまま表示
  if (!html) {
    html = `<div class="section-body">${text.replace(/\n/g, '<br>')}</div>`;
  }

  container.innerHTML = html;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resetBtn').style.display = 'block';

  // スクロール
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// リセット
function resetAll() {
  removeImage();
  document.getElementById('userText').value = '';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';
  hideError();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showLoading(flag) {
  document.getElementById('loading').style.display = flag ? 'block' : 'none';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}
</script>

</body>
</html>
